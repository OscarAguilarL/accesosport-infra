---
- name: Configurar servidor AccesoSport
  hosts: accesosport
  become: true

  tasks:
    # ─── Docker ───────────────────────────────────────────────────────────────
    - name: Instalar dependencias previas de Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - unzip
        state: present
        update_cache: true
      tags: docker

    - name: Crear directorio para GPG keys
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: docker

    - name: Descargar GPG key de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: docker

    - name: Obtener arquitectura del sistema
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false
      tags: docker

    - name: Obtener codename de Ubuntu
      ansible.builtin.shell: . /etc/os-release && echo "$VERSION_CODENAME"
      register: ubuntu_codename
      changed_when: false
      tags: docker

    - name: Agregar repositorio de Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable"
        state: present
        filename: docker
      tags: docker

    - name: Instalar Docker Engine y Compose
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      tags: docker

    - name: Habilitar y arrancar Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: docker

    - name: Agregar usuario ubuntu al grupo docker
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true
      tags: docker

    # ─── AWS CLI ──────────────────────────────────────────────────────────────
    - name: Verificar si AWS CLI está instalado
      ansible.builtin.stat:
        path: /usr/local/bin/aws
      register: awscli_stat
      tags: awscli

    - name: Descargar AWS CLI
      ansible.builtin.get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
      when: not awscli_stat.stat.exists
      tags: awscli

    - name: Descomprimir AWS CLI
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true
      when: not awscli_stat.stat.exists
      tags: awscli

    - name: Instalar AWS CLI
      ansible.builtin.command: /tmp/aws/install
      when: not awscli_stat.stat.exists
      tags: awscli

    # ─── Nginx ────────────────────────────────────────────────────────────────
    - name: Instalar Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
      tags: nginx

    - name: Habilitar y arrancar Nginx
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started
      tags: nginx

    - name: Desactivar sitio default de Nginx
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx
      tags: nginx

    - name: Copiar configuraciones de Nginx a sites-available
      ansible.builtin.copy:
        src: "{{ deploy_dir }}/nginx/{{ item }}"
        dest: "/etc/nginx/sites-available/{{ item }}"
        owner: root
        group: root
        mode: "0644"
        remote_src: true
      loop: "{{ nginx_sites }}"
      notify: Reload nginx
      tags: nginx

    - name: Habilitar sitios Nginx (symlinks en sites-enabled)
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ item }}"
        dest: "/etc/nginx/sites-enabled/{{ item }}"
        state: link
      loop: "{{ nginx_sites }}"
      notify: Reload nginx
      tags: nginx

    # ─── Certbot ──────────────────────────────────────────────────────────────
    - name: Instalar snapd
      ansible.builtin.apt:
        name: snapd
        state: present
      tags: certbot

    - name: Instalar core snap
      ansible.builtin.command: snap install core
      args:
        creates: /snap/core
      tags: certbot

    - name: Instalar certbot via snap
      ansible.builtin.command: snap install --classic certbot
      args:
        creates: /snap/bin/certbot
      tags: certbot

    - name: Crear symlink de certbot
      ansible.builtin.file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link
      tags: certbot

    # ─── Cron ────────────────────────────────────────────────────────────────
    - name: Hacer ejecutable el script de backup
      ansible.builtin.file:
        path: "{{ deploy_dir }}/scripts/backup-postgres.sh"
        mode: "0755"
      tags: cron

    - name: Configurar cron de backup de PostgreSQL (2 AM diario)
      ansible.builtin.cron:
        name: backup-postgres
        user: ubuntu
        minute: "0"
        hour: "2"
        job: >-
          set -a &&
          source {{ deploy_dir }}/.env &&
          set +a &&
          {{ deploy_dir }}/scripts/backup-postgres.sh >> /var/log/pg-backup.log 2>&1
      become_user: ubuntu
      tags: cron

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
