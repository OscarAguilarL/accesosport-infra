services:
  backend-staging:
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPO}:${BACKEND_STAGING_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME_STAGING}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: staging
      APP_JWT_SECRET: ${APP_JWT_SECRET_STAGING}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL_STAGING}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS_STAGING}
      APP_ENV: staging
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY_STAGING}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET_STAGING}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET_STAGING}
      STRIPE_CHECKOUT_SUCCESS_URL: ${APP_FRONTEND_URL_STAGING}/inscripcion/exitosa
      STRIPE_CHECKOUT_CANCEL_URL: ${APP_FRONTEND_URL_STAGING}/inscripcion/cancelada
      STRIPE_ONBOARDING_RETURN_URL: ${APP_FRONTEND_URL_STAGING}/dashboard/settings?tab=pagos&stripe=return
      STRIPE_ONBOARDING_REFRESH_URL: ${APP_FRONTEND_URL_STAGING}/dashboard/settings?tab=pagos&stripe=refresh
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - accesosport_staging

  frontend-staging:
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:${FRONTEND_STAGING_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      BACKEND_URL: http://backend-staging:8080
      NEXT_PUBLIC_APP_URL: ${APP_FRONTEND_URL_STAGING}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accesosport_staging

networks:
  accesosport_staging:
    external: true
