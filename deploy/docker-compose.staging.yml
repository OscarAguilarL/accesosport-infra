services:
  backend-staging:
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPO}:${BACKEND_STAGING_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME_STAGING}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: staging
      JWT_SECRET: ${JWT_SECRET_STAGING}
      JAVA_OPTS: "-Xmx384m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - accesosport_staging

  frontend-staging:
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:${FRONTEND_STAGING_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - accesosport_staging

networks:
  accesosport_staging:
    external: true
